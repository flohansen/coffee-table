syntax = "proto3";
package coffee_table;

option go_package = "./pkg/proto";

service ChatBroker {
    rpc Connect(ConnectRequest) returns (stream Message);
    rpc Broadcast(Message) returns (BroadcastResponse);
}

message ConnectRequest {
    string username = 1;
}

message Message {
    string sender = 1;
    string text = 2;
}

message BroadcastResponse {
}
